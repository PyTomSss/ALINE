_target_: tasks.masked_mnist.MaskedMNISTClassification

name: MaskedMNIST

# ALINE interface
embedding_type: theta
mask_type: ["all"]

n_target_data: 0
n_target_theta: 10
n_selected_targets: null
predefined_masks: null
predefined_mask_weights: null
mask_index: null
attend_to: null

# Active querying
n_context_init: 1
n_query_init: 128

# MNIST patch task
patch_size: 5
noise_scale: 0.05

# Classification target dimension
dim_theta: 10

# Image size kept separately
dim_image: 784

dim_xi: 2
dim_x: 2
dim_y: 25

num_classes: 10
in_channels: 1

allow_padding: true
padding_mode: zeros
align_corners: true

reparameterize_design: false
design_input_range: pixel

data_root: data
download: false

device: ${device}
_seed: ${seed}