name: aline

channels:
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  - python=3.12
  - pip

  - numpy
  - scipy
  - pandas
  - matplotlib
  - tqdm
  - scikit-learn

  - pytorch::pytorch=2.6.*
  - pytorch::torchvision
  - pytorch::torchaudio
  - nvidia::pytorch-cuda=12.4

  - pip:
      - termcolor
      - wandb
      - hydra-core
      - attrdictionary
      - gradnorm-pytorch
      - ipykernel