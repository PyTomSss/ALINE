name: aline

channels:
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  - python=3.12
  - pip

  # Core scientific stack
  - numpy
  - scipy
  - pandas
  - matplotlib
  - tqdm
  - scikit-learn

  # PyTorch CUDA build
  - pytorch=2.6.*
  - torchvision
  - torchaudio
  - pytorch-cuda=12.4

  # pip packages only if not available / preferred via conda
  - pip:
      - termcolor
      - wandb
      - hydra-core
      - attrdictionary
      - gradnorm-pytorch
      - ipykernel